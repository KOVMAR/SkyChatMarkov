<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyChat | Modern Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .message-me { background: linear-gradient(135deg, #3b82f6, #2563eb); border-bottom-right-radius: 2px; }
        .message-other { background: #334155; border-bottom-left-radius: 2px; }
        
        emoji-picker {
            --background: #1e293b;
            --border-color: rgba(255,255,255,0.1);
            --indicator-color: #3b82f6;
            width: 100%;
            max-width: 300px;
            height: 300px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: fadeIn 0.2s ease forwards; }

        /* Фикс для мобильных: убираем скролл у body */
        #app { height: 100dvh; } 
    </style>
</head>
<body class="text-slate-200 flex items-center justify-center">

    <div id="loginForm" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl z-50 m-4">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">SkyChat</h1>
            <p class="text-slate-400 mt-2 text-sm">Вход в систему</p>
        </div>
        <div class="space-y-4">
            <div class="relative">
                <i data-lucide="user" class="absolute left-3 top-3 w-5 h-5 text-slate-500"></i>
                <input id="usernameInput" type="text" placeholder="Имя" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-blue-500 transition-all text-white">
            </div>
            <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-3 w-5 h-5 text-slate-500"></i>
                <input id="passwordInput" type="password" placeholder="Пароль" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-blue-500 transition-all text-white">
            </div>
            <div class="flex gap-3">
                <button id="loginBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all shadow-lg">Войти</button>
                <button id="registerBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition-all">Рег</button>
            </div>
            <div id="loginMsg" class="text-center text-xs text-rose-400 min-h-[16px]"></div>
        </div>
    </div>

    <div id="app" class="hidden w-full max-w-6xl md:h-[90vh] md:rounded-3xl shadow-2xl overflow-hidden glass flex flex-col md:flex-row">
        
        <div id="sidebar" class="w-full md:w-80 border-r border-white/10 flex flex-col bg-slate-900/30 flex-shrink-0">
            <div class="p-5 flex justify-between items-center">
                <h2 class="text-xl font-bold">Чаты</h2>
                <button id="logoutBtn" class="text-slate-400 hover:text-rose-400 p-2"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
            <div class="px-4 mb-4">
                <div class="flex bg-slate-800/50 rounded-lg p-1">
                    <button class="tabBtn active flex-1 py-2 text-xs rounded-md transition-all bg-blue-600 text-white" data-tab="public">Общий</button>
                    <button class="tabBtn flex-1 py-2 text-xs rounded-md transition-all text-slate-400" data-tab="private">Личные</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar px-4 pb-4">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 ml-2">Онлайн (<span id="onlineCount">0</span>)</p>
                <ul id="users" class="space-y-2"></ul>
            </div>
        </div>

        <div id="chatWindow" class="hidden md:flex flex-1 flex flex-col relative bg-slate-900/10">
            <div class="p-4 border-b border-white/10 flex items-center gap-3 bg-white/5">
                <button id="backBtn" class="md:hidden text-slate-400 p-1"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
                <div>
                    <h3 id="chatTitle" class="font-semibold text-base">Публичный чат</h3>
                    <div class="text-[10px] text-emerald-400 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> онлайн
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-4" id="messagesBox">
                <ul id="messages" class="space-y-4"></ul>
                <ul id="privateMessages" class="hidden space-y-4"></ul>
            </div>

            <form id="form" class="p-3 md:p-4 bg-white/5 border-t border-white/10 relative">
                <div id="emojiPickerContainer" class="hidden absolute bottom-20 left-4 z-50 shadow-2xl rounded-2xl overflow-hidden border border-white/10">
                    <emoji-picker></emoji-picker>
                </div>
                <div class="flex gap-2 bg-slate-800/80 rounded-2xl p-1.5 items-center border border-white/5 focus-within:border-blue-500 transition-all">
                    <button type="button" id="emojiBtn" class="text-slate-400 hover:text-yellow-400 p-2"><i data-lucide="smile" class="w-6 h-6"></i></button>
                    <input id="input" autocomplete="off" placeholder="Сообщение..." class="flex-1 bg-transparent border-none outline-none px-2 py-2 text-sm text-white">
                    <button class="bg-blue-600 hover:bg-blue-500 p-2.5 rounded-xl transition-all shadow-lg"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </form>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    lucide.createIcons();

    const sidebar = document.getElementById("sidebar");
    const chatWindow = document.getElementById("chatWindow");
    const backBtn = document.getElementById("backBtn");
    const messagesBox = document.getElementById("messagesBox");
    const input = document.getElementById("input");
    const emojiPickerContainer = document.getElementById('emojiPickerContainer');
    const emojiPicker = emojiPickerContainer.querySelector('emoji-picker');

    let username = null;
    let privateWith = null;
    let currentTab = "public";

    // АДАПТИВНОСТЬ
    function openChat() {
        if (window.innerWidth < 768) {
            sidebar.classList.add("hidden");
            chatWindow.classList.remove("hidden");
            chatWindow.classList.add("flex");
        }
    }
    backBtn.onclick = () => {
        sidebar.classList.remove("hidden");
        chatWindow.classList.add("hidden");
        chatWindow.classList.remove("flex");
        privateWith = null;
    };

    // ТАБЫ
    function showTab(tab){
        currentTab = tab;
        document.querySelectorAll(".tabBtn").forEach(t => {
            const active = t.dataset.tab === tab;
            t.classList.toggle("bg-blue-600", active);
            t.classList.toggle("text-white", active);
            t.classList.toggle("text-slate-400", !active);
        });
        if(tab === "public"){
            document.getElementById("messages").classList.remove("hidden");
            document.getElementById("privateMessages").classList.add("hidden");
            document.getElementById("chatTitle").textContent = "Публичный чат";
        } else {
            document.getElementById("messages").classList.add("hidden");
            document.getElementById("privateMessages").classList.remove("hidden");
            document.getElementById("chatTitle").textContent = privateWith ? `Чат с ${privateWith}` : "Выберите чат";
        }
    }
    document.querySelectorAll(".tabBtn").forEach(t => t.onclick = () => { showTab(t.dataset.tab); if(t.dataset.tab === 'public') openChat(); });

    // ЭМОДЗИ
    document.getElementById('emojiBtn').onclick = (e) => { e.stopPropagation(); emojiPickerContainer.classList.toggle('hidden'); };
    emojiPicker.addEventListener('emoji-click', e => { input.value += e.detail.unicode; input.focus(); });
    document.onclick = (e) => { if (!emojiPickerContainer.contains(e.target)) emojiPickerContainer.classList.add('hidden'); };

    // АВТОРИЗАЦИЯ
    document.getElementById("registerBtn").onclick = () => socket.emit("register", {username: usernameInput.value, password: passwordInput.value});
    document.getElementById("loginBtn").onclick = () => socket.emit("login", {username: usernameInput.value, password: passwordInput.value});
    
    socket.on("register result", ({success, msg}) => {
        document.getElementById("loginMsg").textContent = success ? "Успешно! Войдите." : msg;
        document.getElementById("loginMsg").className = success ? "text-center text-xs text-emerald-400" : "text-center text-xs text-rose-400";
    });

    socket.on("login result", ({success, username: user, msg}) => {
        if(!success) { document.getElementById("loginMsg").textContent = msg; return; }
        username = user;
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("app").classList.add("flex");
    });

    document.getElementById("logoutBtn").onclick = () => location.reload();

    // СПИСОК ЮЗЕРОВ
    socket.on("update users", (onlineUsers) => {
        const ul = document.getElementById("users");
        ul.innerHTML = "";
        document.getElementById("onlineCount").textContent = onlineUsers.length;
        onlineUsers.forEach(u => {
            if(u === username) return;
            const li = document.createElement("li");
            li.className = "flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all border border-transparent hover:border-white/10 group";
            li.innerHTML = `<div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold text-blue-400">${u[0].toUpperCase()}</div>
                            <div class="text-sm font-medium">${u}</div>`;
            li.onclick = () => { privateWith = u; showTab("private"); socket.emit("get private history", {withUser: u}); openChat(); };
            ul.appendChild(li);
        });
    });

    // СООБЩЕНИЯ
    function renderMessage(container, msg, meName) {
        const isMe = (msg.user === meName || msg.from === meName);
        const isSys = msg.user === "Система";
        const li = document.createElement("li");
        li.className = `flex ${isMe ? 'justify-end' : 'justify-start'} msg-anim`;
        if(isSys) {
            li.innerHTML = `<span class="text-[10px] text-slate-500 w-full text-center my-1">${msg.text}</span>`;
        } else {
            li.innerHTML = `<div class="max-w-[85%] md:max-w-[70%]">
                <div class="text-[9px] text-slate-500 mb-0.5 ${isMe ? 'text-right' : 'ml-1'}">${isMe?'Вы':(msg.user||msg.from)} • ${msg.time}</div>
                <div class="p-3 px-4 rounded-2xl text-sm ${isMe ? 'message-me text-white' : 'message-other text-slate-100'}">${msg.text}</div>
            </div>`;
        }
        container.appendChild(li);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    socket.on("chat history", (h) => { document.getElementById("messages").innerHTML = ""; h.forEach(m => renderMessage(document.getElementById("messages"), m, username)); });
    socket.on("chat message", (m) => renderMessage(document.getElementById("messages"), m, username));
    socket.on("private history", ({history}) => { document.getElementById("privateMessages").innerHTML = ""; history.forEach(m => renderMessage(document.getElementById("privateMessages"), m, username)); });
    socket.on("private message", (m) => { if(privateWith === m.from || m.from === username) renderMessage(document.getElementById("privateMessages"), m, username); });

    document.getElementById("form").onsubmit = (e) => {
        e.preventDefault();
        if(!input.value.trim()) return;
        if(currentTab === "private" && privateWith) socket.emit("private message", {to: privateWith, text: input.value});
        else socket.emit("chat message", {text: input.value});
        input.value = "";
    };
</script>
</body>
</html>
