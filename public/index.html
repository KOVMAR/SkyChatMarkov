<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyChat | Modern Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            height: 100dvh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #chatWindow {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #messagesBox {
            flex: 1 1 0%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        #messages, #privateMessages {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message-me { background: linear-gradient(135deg, #3b82f6, #2563eb); align-self: flex-end; border-radius: 18px 18px 2px 18px; }
        .message-other { background: #334155; align-self: flex-start; border-radius: 18px 18px 18px 2px; }

        emoji-picker {
            --background: #1e293b;
            --border-color: rgba(255,255,255,0.1);
            width: 100%;
            max-width: 320px;
            height: 300px;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: slideUp 0.2s ease-out forwards; }

        /* Toast уведомление */
        #toast {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15, 23, 42, 0.97);
            border: 1px solid rgba(99, 102, 241, 0.35);
            border-radius: 1.1rem;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 300px;
            cursor: pointer;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #toast.show { transform: translateX(0); }
        #toastAvatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: #1e293b;
            border: 2px solid rgba(99,102,241,0.5);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: #818cf8; font-size: 15px; flex-shrink: 0;
        }
    </style>
</head>
<body class="text-slate-200">

    <!-- Toast уведомление -->
    <div id="toast">
        <div id="toastAvatar">?</div>
        <div style="overflow:hidden">
            <div id="toastName" class="text-xs font-bold text-indigo-400 mb-0.5"></div>
            <div id="toastText" class="text-xs text-slate-300" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px"></div>
        </div>
    </div>

    <div id="loginForm" class="glass w-full max-w-[400px] p-8 rounded-[2.5rem] shadow-2xl z-[100] mx-4">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-500/10 rounded-2xl mb-4 border border-blue-500/20">
                <i data-lucide="zap" class="w-8 h-8 text-blue-400"></i>
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter text-white">SkyChat</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] mt-2 font-bold">Secure Gateway</p>
        </div>
        <div class="space-y-4">
            <input id="usernameInput" type="text" placeholder="Логин" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
            <input id="passwordInput" type="password" placeholder="Пароль" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button id="loginBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">Войти</button>
                <button id="registerBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl transition-all">Регистрация</button>
            </div>
            <div id="loginMsg" class="text-center text-[11px] text-rose-500 uppercase tracking-widest min-h-[20px] mt-4 font-medium"></div>
        </div>
    </div>

    <div id="app" class="hidden w-full max-w-6xl h-full md:h-[90vh] md:rounded-3xl shadow-2xl overflow-hidden glass flex-col md:flex-row">
        <div id="sidebar" class="w-full md:w-80 border-r border-white/5 flex flex-col bg-slate-900/20 flex-shrink-0">
            <div class="p-6 flex justify-between items-center border-b border-white/5">
                <h2 class="text-xl font-black italic tracking-tight">SkyChat</h2>
                <button id="logoutBtn" class="text-slate-500 hover:text-rose-400 p-1"><i data-lucide="power" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4">
                <div class="flex bg-slate-800/40 rounded-xl p-1 border border-white/5">
                    <button class="tabBtn active flex-1 py-2 text-[10px] font-bold uppercase rounded-lg transition-all bg-blue-600 text-white" data-tab="public">Общий</button>
                    <button class="tabBtn flex-1 py-2 text-[10px] font-bold uppercase rounded-lg transition-all text-slate-500" data-tab="private">Личные</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar px-4 pb-6">
                <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-4 ml-2">Online • <span id="onlineCount">0</span></p>
                <ul id="users" class="space-y-1"></ul>
            </div>
        </div>

        <div id="chatWindow" class="flex-1 flex-col relative bg-slate-900/10 overflow-hidden">
            <div class="p-4 md:p-5 border-b border-white/5 flex items-center gap-4 bg-white/5 backdrop-blur-sm">
                <button id="backBtn" class="md:hidden text-slate-400 p-1"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                <div class="flex-1">
                    <h3 id="chatTitle" class="font-bold text-sm md:text-base leading-none">Публичный чат</h3>
                </div>
            </div>

            <div id="messagesBox" class="custom-scrollbar">
                <ul id="messages"></ul>
                <ul id="privateMessages" class="hidden"></ul>
            </div>

            <form id="form" class="p-4 bg-slate-900/40 border-t border-white/5 relative flex-shrink-0">
                <div id="emojiPickerContainer" class="hidden absolute bottom-24 left-4 z-50 shadow-2xl rounded-2xl overflow-hidden border border-white/10">
                    <emoji-picker class="light"></emoji-picker>
                </div>
                <div class="flex gap-2 bg-slate-800/60 rounded-2xl p-1.5 border border-white/5 focus-within:border-blue-500/50 transition-all">
                    <button type="button" id="emojiBtn" class="text-slate-500 hover:text-yellow-400 p-2"><i data-lucide="smile" class="w-6 h-6"></i></button>
                    <input id="input" autocomplete="off" placeholder="Сообщение..." class="flex-1 bg-transparent border-none outline-none px-2 py-2 text-sm text-white">
                    <button class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl shadow-lg"><i data-lucide="send-horizontal" class="w-5 h-5 text-white"></i></button>
                </div>
            </form>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    lucide.createIcons();

    const sidebar = document.getElementById("sidebar");
    const chatWindow = document.getElementById("chatWindow");
    const loginForm = document.getElementById("loginForm");
    const app = document.getElementById("app");
    const messagesBox = document.getElementById("messagesBox");
    const input = document.getElementById("input");
    const emojiPickerContainer = document.getElementById('emojiPickerContainer');
    const emojiPicker = emojiPickerContainer.querySelector('emoji-picker');
    const toast = document.getElementById("toast");

    let username = null, privateWith = null, currentTab = "public";
    let toastTimer = null;

    // ─── Звук уведомления через Web Audio API (без внешних файлов) ───
    function playNotificationSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playTone = (freq, start, duration, vol) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(vol, start + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                osc.start(start);
                osc.stop(start + duration);
            };
            // Два тона — приятный "дин-дон"
            playTone(880,  ctx.currentTime,        0.15, 0.25);
            playTone(1100, ctx.currentTime + 0.16, 0.22, 0.18);
        } catch (e) { /* браузер заблокировал — молча пропускаем */ }
    }

    // ─── Toast ───
    let toastTimeout = null;
    function showToast(from, text) {
        document.getElementById("toastAvatar").textContent = from[0].toUpperCase();
        document.getElementById("toastName").textContent = from;
        document.getElementById("toastText").textContent = text;
        toast.classList.add("show");
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove("show"), 4000);
    }

    // Клик по тосту — переходим в чат с этим человеком
    toast.onclick = () => {
        const name = document.getElementById("toastName").textContent;
        if (name) {
            privateWith = name;
            showTab("private");
            socket.emit("get private history", { withUser: name });
            openChat();
        }
        toast.classList.remove("show");
    };

    // ─── Helpers ───
    const scrollToBottom = () => { messagesBox.scrollTop = messagesBox.scrollHeight; };
    const isDesktop = () => window.innerWidth >= 768;

    function openChat() {
        if (!isDesktop()) {
            sidebar.classList.add("hidden");
            chatWindow.classList.remove("hidden");
            chatWindow.classList.add("flex");
        }
        setTimeout(scrollToBottom, 50);
    }

    document.getElementById("backBtn").onclick = () => {
        sidebar.classList.remove("hidden");
        chatWindow.classList.add("hidden");
        chatWindow.classList.remove("flex");
    };

    document.getElementById('emojiBtn').onclick = (e) => {
        e.stopPropagation();
        emojiPickerContainer.classList.toggle('hidden');
    };
    emojiPicker.addEventListener('emoji-click', e => { input.value += e.detail.unicode; input.focus(); });
    document.onclick = (e) => { if (!emojiPickerContainer.contains(e.target)) emojiPickerContainer.classList.add('hidden'); };

    document.getElementById("registerBtn").onclick = () => socket.emit("register", { username: usernameInput.value, password: passwordInput.value });
    document.getElementById("loginBtn").onclick = () => socket.emit("login", { username: usernameInput.value, password: passwordInput.value });

    socket.on("login result", ({ success, username: user, msg }) => {
        if (!success) { document.getElementById("loginMsg").textContent = msg; return; }
        username = user;
        loginForm.classList.add("hidden");
        app.classList.remove("hidden");
        app.classList.add("flex");
        sidebar.classList.remove("hidden");

        if (isDesktop()) {
            chatWindow.classList.remove("hidden");
            chatWindow.classList.add("flex");
        } else {
            chatWindow.classList.add("hidden");
            chatWindow.classList.remove("flex");
        }

        lucide.createIcons();
        setTimeout(scrollToBottom, 100);
    });

    socket.on("update users", (onlineUsers) => {
        const ul = document.getElementById("users");
        ul.innerHTML = "";
        document.getElementById("onlineCount").textContent = onlineUsers.length;
        onlineUsers.forEach(u => {
            if (u === username) return;
            const li = document.createElement("li");
            li.className = "flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all border border-transparent";
            li.innerHTML = `<div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center font-bold text-blue-500">${u[0].toUpperCase()}</div><div class="text-xs font-semibold">${u}</div>`;
            li.onclick = () => {
                privateWith = u;
                showTab("private");
                socket.emit("get private history", { withUser: u });
                openChat();
            };
            ul.appendChild(li);
        });
    });

    function renderMessage(container, msg, meName) {
        const isMe = (msg.user === meName || msg.from === meName);
        const li = document.createElement("li");
        li.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} msg-anim w-full`;
        if (msg.user === "Система") {
            li.innerHTML = `<span class="text-[9px] text-slate-600 font-bold uppercase tracking-widest w-full text-center my-2">${msg.text}</span>`;
        } else {
            li.innerHTML = `<span class="text-[9px] text-slate-500 mb-1 px-2">${isMe ? 'Вы' : (msg.user || msg.from)} • ${msg.time}</span>
                            <div class="p-3 px-4 max-w-[85%] text-sm ${isMe ? 'message-me text-white' : 'message-other text-slate-100'}">${msg.text}</div>`;
        }
        container.appendChild(li);
        scrollToBottom();
    }

    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tabBtn").forEach(t => {
            const active = t.dataset.tab === tab;
            t.classList.toggle("bg-blue-600", active);
            t.classList.toggle("text-white", active);
            t.classList.toggle("text-slate-500", !active);
        });
        document.getElementById("messages").classList.toggle("hidden", tab !== "public");
        document.getElementById("privateMessages").classList.toggle("hidden", tab !== "private");
        document.getElementById("chatTitle").textContent = tab === "public" ? "Публичный чат" : (privateWith ? `Чат с ${privateWith}` : "Личные сообщения");
        setTimeout(scrollToBottom, 50);
    }

    document.querySelectorAll(".tabBtn").forEach(t => t.onclick = () => {
        showTab(t.dataset.tab);
        if (!isDesktop()) openChat();
    });

    socket.on("chat history", h => {
        document.getElementById("messages").innerHTML = "";
        h.forEach(m => renderMessage(document.getElementById("messages"), m, username));
    });
    socket.on("chat message", m => renderMessage(document.getElementById("messages"), m, username));

    socket.on("private history", ({ history }) => {
        document.getElementById("privateMessages").innerHTML = "";
        history.forEach(m => renderMessage(document.getElementById("privateMessages"), m, username));
    });

    socket.on("private message", m => {
        const isIncoming = m.from !== username;
        const isActiveChat = currentTab === "private" && privateWith === m.from;

        // Звук + тост только если сообщение входящее и мы не в этом чате
        if (isIncoming && !isActiveChat) {
            playNotificationSound();
            showToast(m.from, m.text);
        }

        if (privateWith === m.from || m.from === username) {
            renderMessage(document.getElementById("privateMessages"), m, username);
        }
    });

    document.getElementById("form").onsubmit = (e) => {
        e.preventDefault();
        if (!input.value.trim()) return;
        if (currentTab === "private" && privateWith) socket.emit("private message", { to: privateWith, text: input.value });
        else socket.emit("chat message", { text: input.value });
        input.value = "";
    };

    document.getElementById("logoutBtn").onclick = () => location.reload();
</script>
</body>
</html>
