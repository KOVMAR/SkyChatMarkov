<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyChat | Modern Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-slate-200">

<!-- ── Toast ── -->
<div id="toast">
    <div id="toastAvatar">?</div>
    <div style="overflow:hidden">
        <div id="toastName" class="text-xs font-bold text-indigo-400 mb-0.5"></div>
        <div id="toastText" class="text-xs text-slate-300" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px"></div>
    </div>
</div>

<!-- ── Forward modal ── -->
<div id="forwardModal" class="hidden">
    <div class="modal-box">
        <h3 class="font-bold text-sm mb-3 text-white">Переслать сообщение</h3>
        <ul id="forwardUserList" class="space-y-1 max-h-72 overflow-y-auto custom-scrollbar"></ul>
        <button id="forwardCancelBtn" class="mt-4 w-full py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-sm font-medium transition-all text-slate-300">Отмена</button>
    </div>
</div>

<!-- ── Login ── -->
<div id="loginForm" class="glass w-full max-w-[400px] p-8 rounded-[2.5rem] shadow-2xl z-[100] mx-4">
    <div class="text-center mb-7">
        <div class="inline-block p-4 bg-blue-500/10 rounded-2xl mb-4 border border-blue-500/20">
            <i data-lucide="zap" class="w-8 h-8 text-blue-400"></i>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter text-white">SkyChat</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] mt-2 font-bold">Secure Gateway</p>
    </div>

    <div class="flex bg-slate-800/50 rounded-2xl p-1 border border-white/5 mb-6">
        <button class="authTab flex-1 py-2.5 text-[11px] font-bold uppercase rounded-xl transition-all bg-blue-600 text-white" data-form="loginPanel">Вход</button>
        <button class="authTab flex-1 py-2.5 text-[11px] font-bold uppercase rounded-xl transition-all text-slate-500" data-form="registerPanel">Регистрация</button>
    </div>

    <div id="loginPanel" class="form-panel space-y-4">
        <input id="loginUsername" type="text"     placeholder="Логин"  class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
        <input id="loginPassword" type="password" placeholder="Пароль" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">Войти</button>
        <div id="loginMsg" class="text-center text-[11px] text-rose-500 uppercase tracking-widest min-h-[18px] font-medium"></div>
    </div>

    <div id="registerPanel" class="hidden form-panel space-y-4">
        <input id="regUsername"  type="text"     placeholder="Придумайте логин"  class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
        <input id="regPassword"  type="password" placeholder="Придумайте пароль" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
        <input id="regPassword2" type="password" placeholder="Повторите пароль"  class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-blue-500 transition-all text-sm text-white">
        <button id="registerBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">Зарегистрироваться</button>
        <div id="registerMsg" class="text-center text-[11px] uppercase tracking-widest min-h-[18px] font-medium"></div>
    </div>
</div>

<!-- ── App ── -->
<div id="app" class="hidden w-full max-w-6xl h-full md:h-[90vh] md:rounded-3xl shadow-2xl overflow-hidden glass flex-col md:flex-row">

    <!-- Sidebar -->
    <div id="sidebar" class="w-full md:w-80 border-r border-white/5 flex flex-col bg-slate-900/20 flex-shrink-0">
        <div class="p-6 flex justify-between items-center border-b border-white/5">
            <h2 class="text-xl font-black italic tracking-tight">SkyChat</h2>
            <button id="logoutBtn" class="text-slate-500 hover:text-rose-400 p-1"><i data-lucide="power" class="w-5 h-5"></i></button>
        </div>
        <div class="p-4">
            <div class="flex bg-slate-800/40 rounded-xl p-1 border border-white/5">
                <button class="tabBtn active flex-1 py-2 text-[10px] font-bold uppercase rounded-lg transition-all bg-blue-600 text-white" data-tab="public">Общий</button>
                <button class="tabBtn flex-1 py-2 text-[10px] font-bold uppercase rounded-lg transition-all text-slate-500" data-tab="private">Личные</button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar px-4 pb-6">
            <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-4 ml-2">Online • <span id="onlineCount">0</span></p>
            <ul id="users" class="space-y-1"></ul>
        </div>
    </div>

    <!-- Chat window -->
    <div id="chatWindow" class="flex-1 flex-col relative bg-slate-900/10 overflow-hidden">

        <!-- Header -->
        <div class="p-4 md:p-5 border-b border-white/5 flex items-center gap-4 bg-white/5 backdrop-blur-sm flex-shrink-0 relative" style="z-index:1;">
            <button id="backBtn" class="md:hidden text-slate-400 p-1"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <div class="flex-1"><h3 id="chatTitle" class="font-bold text-sm md:text-base leading-none">Публичный чат</h3></div>
        </div>

        <!-- Selection toolbar (absolute, overlays header) -->
        <div id="selectionBar" class="hidden" style="z-index:10;">
            <span class="text-sm font-bold text-white"><span id="selCount">0</span> выбрано</span>
            <button id="selReplyBtn"><i data-lucide="corner-up-left" class="w-4 h-4"></i> Ответить</button>
            <button id="selForwardBtn"><i data-lucide="forward" class="w-4 h-4"></i> Переслать</button>
            <button id="selCancelBtn" class="cancel-sel"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>

        <!-- Messages -->
        <div id="messagesBox" class="custom-scrollbar">
            <ul id="messages"></ul>
            <ul id="privateMessages" class="hidden"></ul>
        </div>

        <!-- Typing indicator -->
        <div id="typingIndicator" class="hidden">
            <span class="pencil-icon">✏️</span>
            <span id="typingName"></span>
            <span>печатает</span>
            <span class="typing-dots"><span></span><span></span><span></span></span>
        </div>

        <!-- Reply preview -->
        <div id="replyPreview" class="hidden">
            <div class="reply-bar">
                <div class="reply-who" id="replyWho"></div>
                <div class="reply-text" id="replyText"></div>
            </div>
            <button id="cancelReplyBtn" class="text-slate-500 hover:text-rose-400 p-1 ml-2 flex-shrink-0">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- Recording bar -->
        <div id="recordingBar" class="hidden">
            <div class="rec-dot"></div>
            <span class="text-red-400 text-xs font-bold">Запись</span>
            <span id="recTimer" class="text-red-300 text-xs font-mono">0:00</span>
            <span class="text-slate-500 text-xs ml-auto">Отпустите для остановки</span>
        </div>

        <!-- Voice preview -->
        <div id="voicePreview" class="hidden">
            <div id="voicePreviewPlayer" class="flex-1"></div>
            <button id="deleteVoiceBtn" class="input-icon-btn text-rose-400 hover:text-rose-300 flex-shrink-0">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
            <button id="sendVoiceBtn" class="send-btn flex-shrink-0">
                <i data-lucide="send-horizontal" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- File preview -->
        <div id="filePreview" class="hidden">
            <img id="filePreviewThumb" class="hidden" alt="">
            <div id="filePreviewIcon" class="hidden"><i data-lucide="file" class="w-5 h-5 text-blue-400"></i></div>
            <div class="flex-1 min-w-0">
                <div id="filePreviewName" class="text-xs font-semibold text-slate-200 truncate"></div>
                <div id="filePreviewSize" class="text-[10px] text-slate-500 mt-0.5"></div>
            </div>
            <button id="deleteFileBtn" class="input-icon-btn text-rose-400 hover:text-rose-300 flex-shrink-0">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- Attach menu -->
        <div id="attachMenu" class="hidden">
            <button data-accept="image/*"><i data-lucide="image"     class="w-4 h-4 text-blue-400"></i>   Фото</button>
            <button data-accept="video/*"><i data-lucide="video"     class="w-4 h-4 text-violet-400"></i> Видео</button>
            <button data-accept="audio/*"><i data-lucide="music"     class="w-4 h-4 text-emerald-400"></i>Музыка</button>
            <button data-accept="*/*">    <i data-lucide="paperclip" class="w-4 h-4 text-slate-400"></i>  Файл</button>
        </div>

        <!-- Emoji picker -->
        <div id="emojiPickerContainer" class="hidden absolute bottom-20 left-4 z-50 shadow-2xl rounded-2xl overflow-hidden border border-white/10" style="z-index:300;">
            <emoji-picker></emoji-picker>
        </div>

        <!-- Input form -->
        <form id="form" class="p-3 flex-shrink-0 relative" style="background:rgba(15,23,42,0.5);">
            <div class="input-row">
                <button type="button" id="attachBtn" class="input-icon-btn" title="Прикрепить">
                    <i data-lucide="paperclip" class="w-5 h-5"></i>
                </button>
                <button type="button" id="emojiBtn" class="input-icon-btn" title="Эмодзи">
                    <i data-lucide="smile" class="w-5 h-5"></i>
                </button>
                <textarea id="input" autocomplete="off" placeholder="Сообщение…" rows="1"></textarea>
                <button type="button" id="voiceBtn" class="input-icon-btn" title="Голосовое (удержать)">
                    <i data-lucide="mic" class="w-5 h-5"></i>
                </button>
                <button type="submit" class="send-btn" title="Отправить">
                    <i data-lucide="send-horizontal" class="w-4 h-4"></i>
                </button>
            </div>
        </form>

    </div><!-- /chatWindow -->
</div><!-- /app -->

<input type="file" id="fileInput" class="hidden">

<script src="/socket.io/socket.io.js"></script>
<script>
    // Lucide must be ready before app.js runs
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>
<script src="app.js" defer></script>
</body>
</html>
