<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyChat | Modern Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            height: 100vh;
            overflow: hidden;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .message-me { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .message-other { background: #334155; }
        
        /* Стилизация Emoji Picker под темную тему */
        emoji-picker {
            --background: #1e293b;
            --border-color: rgba(255,255,255,0.1);
            --indicator-color: #3b82f6;
            --outline-color: #3b82f6;
            width: 100%;
            max-width: 320px;
            height: 300px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body class="text-slate-200 flex items-center justify-center p-4">

    <div id="loginForm" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl z-50">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">SkyChat</h1>
            <p class="text-slate-400 mt-2">Добро пожаловать</p>
        </div>
        <div class="space-y-4">
            <div class="relative">
                <i data-lucide="user" class="absolute left-3 top-3 w-5 h-5 text-slate-500"></i>
                <input id="usernameInput" type="text" placeholder="Имя пользователя" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-3 w-5 h-5 text-slate-500"></i>
                <input id="passwordInput" type="password" placeholder="Пароль" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="flex gap-3 pt-2">
                <button id="loginBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-500/20">Войти</button>
                <button id="registerBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition-all">Регистрация</button>
            </div>
            <div id="loginMsg" class="text-center text-sm text-rose-400 min-h-[20px]"></div>
        </div>
    </div>

    <div id="app" class="hidden glass w-full max-w-6xl h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="w-full md:w-80 border-r border-white/10 flex flex-col bg-slate-900/30">
            <div class="p-6 flex justify-between items-center">
                <h2 class="text-xl font-bold">Чаты</h2>
                <button id="logoutBtn" class="text-slate-400 hover:text-rose-400 transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="px-4 mb-4">
                <div class="flex bg-slate-800/50 rounded-lg p-1">
                    <button class="tabBtn active flex-1 py-2 text-sm rounded-md transition-all bg-blue-600 text-white" data-tab="public">Общий</button>
                    <button class="tabBtn flex-1 py-2 text-sm rounded-md transition-all text-slate-400" data-tab="private">Личные</button>
                </div>
            </div>

            <div id="usersContainer" class="flex-1 overflow-y-auto custom-scrollbar px-4">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 ml-2">Онлайн — <span id="onlineCount">0</span></p>
                <ul id="users" class="space-y-2"></ul>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative">
            <div class="p-5 border-b border-white/10 flex items-center justify-between bg-white/5">
                <div>
                    <h3 id="chatTitle" class="font-semibold text-lg">Публичный чат</h3>
                    <p id="chatStatus" class="text-xs text-emerald-400 flex items-center gap-1">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> активно
                    </p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-4" id="messagesBox">
                <ul id="messages" class="space-y-4"></ul>
                <ul id="privateMessages" class="hidden space-y-4"></ul>
            </div>

            <form id="form" class="p-4 bg-white/5 border-t border-white/10 relative">
                <div id="emojiPickerContainer" class="hidden absolute bottom-20 left-4 z-50 shadow-2xl rounded-2xl overflow-hidden border border-white/10">
                    <emoji-picker class="light"></emoji-picker>
                </div>

                <div class="flex gap-3 bg-slate-800/80 rounded-2xl p-2 items-center border border-white/5 focus-within:border-blue-500 transition-all">
                    <button type="button" id="emojiBtn" class="text-slate-400 hover:text-yellow-400 p-2 transition-colors">
                        <i data-lucide="smile" class="w-6 h-6"></i>
                    </button>
                    <input id="input" autocomplete="off" placeholder="Напишите сообщение..." class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-white placeholder:text-slate-500">
                    <button class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl transition-all shadow-lg">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    lucide.createIcons();

    const loginForm = document.getElementById("loginForm");
    const app = document.getElementById("app");
    const messagesBox = document.getElementById("messagesBox");
    const usersList = document.getElementById("users");
    const messages = document.getElementById("messages");
    const privateMessages = document.getElementById("privateMessages");
    const chatTitle = document.getElementById("chatTitle");
    const input = document.getElementById("input");
    const form = document.getElementById("form");
    
    // Элементы эмодзи
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPickerContainer = document.getElementById('emojiPickerContainer');
    const emojiPicker = emojiPickerContainer.querySelector('emoji-picker');

    let username = null;
    let privateWith = null;
    let currentTab = "public";

    // Логика эмодзи
    emojiBtn.onclick = (e) => {
        e.stopPropagation();
        emojiPickerContainer.classList.toggle('hidden');
    };

    emojiPicker.addEventListener('emoji-click', event => {
        input.value += event.detail.unicode;
        input.focus();
    });

    document.addEventListener('click', (e) => {
        if (!emojiPickerContainer.contains(e.target) && e.target !== emojiBtn) {
            emojiPickerContainer.classList.add('hidden');
        }
    });

    // Переключение вкладок
    function showTab(tab){
        currentTab = tab;
        document.querySelectorAll(".tabBtn").forEach(t => {
            const isActive = t.dataset.tab === tab;
            t.classList.toggle("bg-blue-600", isActive);
            t.classList.toggle("text-white", isActive);
            t.classList.toggle("text-slate-400", !isActive);
        });
        
        if(tab === "public"){
            messages.classList.remove("hidden");
            privateMessages.classList.add("hidden");
            chatTitle.textContent = "Публичный чат";
            privateWith = null;
        } else {
            messages.classList.add("hidden");
            privateMessages.classList.remove("hidden");
            chatTitle.textContent = privateWith ? `Чат с ${privateWith}` : "Выберите собеседника";
        }
    }

    document.querySelectorAll(".tabBtn").forEach(t => t.addEventListener("click", () => showTab(t.dataset.tab)));

    // Авторизация
    document.getElementById("registerBtn").onclick = () => {
        socket.emit("register", {username: usernameInput.value, password: passwordInput.value});
    };
    document.getElementById("loginBtn").onclick = () => {
        socket.emit("login", {username: usernameInput.value, password: passwordInput.value});
    };

    socket.on("register result", ({success, msg}) => {
        const m = document.getElementById("loginMsg");
        m.textContent = success ? "Успешно! Войдите." : msg;
        m.className = success ? "text-center text-sm text-emerald-400" : "text-center text-sm text-rose-400";
    });

    socket.on("login result", ({success, username: user, msg}) => {
        if(!success) { document.getElementById("loginMsg").textContent = msg; return; }
        username = user;
        loginForm.classList.add("hidden");
        app.classList.remove("hidden");
        app.classList.add("flex");
    });

    document.getElementById("logoutBtn").onclick = () => location.reload();

    // Пользователи
    socket.on("update users", (onlineUsers) => {
        usersList.innerHTML = "";
        document.getElementById("onlineCount").textContent = onlineUsers.length;
        onlineUsers.forEach(u => {
            if(u === username) return;
            const li = document.createElement("li");
            li.className = "flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all border border-transparent hover:border-white/10 group";
            li.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center font-bold text-blue-400 group-hover:scale-110 transition-transform">
                    ${u[0].toUpperCase()}
                </div>
                <div class="flex-1">
                    <div class="text-sm font-medium">${u}</div>
                    <div class="text-[10px] text-emerald-500">online</div>
                </div>
            `;
            li.onclick = () => {
                privateWith = u;
                showTab("private");
                socket.emit("get private history", {withUser: u});
            };
            usersList.appendChild(li);
        });
    });

    // Рендер сообщений
    function renderMessage(container, msg, meName) {
        const isMe = msg.user === meName || msg.from === meName;
        const isSystem = msg.user === "Система";
        const li = document.createElement("li");
        li.className = `flex ${isMe ? 'justify-end' : 'justify-start'} msg-anim`;
        
        if(isSystem) {
            li.innerHTML = `<span class="text-[10px] text-slate-500 uppercase tracking-widest w-full text-center my-2">${msg.text} • ${msg.time}</span>`;
        } else {
            li.innerHTML = `
                <div class="max-w-[80%] md:max-w-[60%]">
                    <div class="text-[10px] text-slate-500 mb-1 ${isMe ? 'text-right' : 'ml-2'}">
                        ${isMe ? 'Вы' : (msg.user || msg.from)} • ${msg.time}
                    </div>
                    <div class="p-3 px-4 rounded-2xl shadow-sm ${isMe ? 'message-me text-white rounded-tr-none' : 'message-other text-slate-100 rounded-tl-none'}">
                        ${msg.text}
                    </div>
                </div>
            `;
        }
        container.appendChild(li);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    socket.on("chat history", (history) => { messages.innerHTML = ""; history.forEach(m => renderMessage(messages, m, username)); });
    socket.on("chat message", (msg) => renderMessage(messages, msg, username));
    
    socket.on("private history", ({history}) => {
        privateMessages.innerHTML = "";
        history.forEach(m => renderMessage(privateMessages, m, username));
    });

    socket.on("private message", (msg) => {
        if (privateWith === msg.from || (msg.from === username && privateWith !== null)) {
            renderMessage(privateMessages, msg, username);
        }
    });

    form.onsubmit = (e) => {
        e.preventDefault();
        if(!input.value.trim()) return;
        const text = input.value;
        input.value = "";
        emojiPickerContainer.classList.add('hidden'); // Скрываем эмодзи после отправки
        if(currentTab === "private" && privateWith) {
            socket.emit("private message", {to: privateWith, text});
        } else {
            socket.emit("chat message", {text});
        }
    };
</script>
</body>
</html>
